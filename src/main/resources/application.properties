spring.application.name=${SPRING_APPLICATION_NAME:additional-service}

server.port=${SERVER_PORT:8082}

# LAB15: local defaults (docker/k8s переопределяют в application-docker.properties)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:additional;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
# liveness — только процесс (k8s не убивает под из‑за медленной БД/Kafka)
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db,kafka

app.crud.base-url=${CRUD_BASE_URL:http://localhost:8081}
app.crud.connect-timeout-ms=${CRUD_CONNECT_TIMEOUT_MS:3000}
app.crud.read-timeout-ms=${CRUD_READ_TIMEOUT_MS:5000}

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

observability.windows=${OBSERVABILITY_WINDOWS:10s,30s,1m}
observability.tick-ms=${OBSERVABILITY_TICK_MS:1000}
observability.log-on-refresh=${OBSERVABILITY_LOG_ON_REFRESH:true}
observability.log-empty-snapshots=${OBSERVABILITY_LOG_EMPTY_SNAPSHOTS:false}

# LAB10: период лога статистики кеша пользователей (ms), см. UserCacheService
user-cache.stats-log-ms=${USER_CACHE_STATS_LOG_MS:60000}
user-cache.stats-log-enabled=${USER_CACHE_STATS_LOG_ENABLED:true}
