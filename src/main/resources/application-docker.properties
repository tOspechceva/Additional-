# Порт Additional service (должен совпадать с настройками Docker Compose).
server.port=8082

# CRUD service base URL, куда Additional service ходит за данными.
# По умолчанию: имя контейнера/сервис в docker-compose и порт 8081.
app.crud.base-url=${CRUD_BASE_URL:http://app:8081}

# Таймауты для запросов к CRUD service.
# connectTimeout — время на установление соединения (ms)
# readTimeout — время ожидания ответа (ms)
app.crud.connect-timeout-ms=${CRUD_CONNECT_TIMEOUT_MS:3000}
app.crud.read-timeout-ms=${CRUD_READ_TIMEOUT_MS:5000}

# Включаем Swagger/OpenAPI в окружении Docker.
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

observability.windows=${OBSERVABILITY_WINDOWS:10s,30s,1m}
observability.tick-ms=${OBSERVABILITY_TICK_MS:1000}
